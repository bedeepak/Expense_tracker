{% extends "tracker/base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card p-4">

<h4 class="mb-4">Edit Expense</h4>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Description</label>
<input type="text" name="description" value="{{ expense.description }}" class="form-control">
</div>

<div class="mb-3">
<label>Category</label>
<input type="text" name="category" value="{{ expense.category }}" class="form-control">
</div>

<div class="mb-3">
<label>Amount</label>
<input type="number" name="amount" value="{{ expense.amount }}" step="0.01" class="form-control">
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" name="date" value="{{ expense.date|date:'Y-m-d' }}" class="form-control">
</div>

<button class="btn btn-primary w-100">
Update Expense
</button>

</form>

</div>

</div>

</div>

{% endblock %}
